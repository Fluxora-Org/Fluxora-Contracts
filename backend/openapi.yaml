  # ============================================================================
  # RECOMMENDATION ROUTES — /users/recommendations
  # ============================================================================

  /users/recommendations/mentors:
    get:
      operationId: getRecommendations
      summary: Get personalised mentor recommendations
      description: |
        Returns up to 5 ranked mentor recommendations for the authenticated learner,
        computed by a weighted scoring algorithm across four dimensions:

        | Dimension | Weight | Algorithm |
        |---|---|---|
        | Skill match | 40% | Jaccard similarity between learner goals/skillGaps and mentor skills |
        | Rating | 30% | Normalised from [4.0, 5.0] → [0.0, 1.0] |
        | Availability | 20% | Slot count / `isAvailable` flag |
        | Price fit | 10% | Learner budget ÷ mentor hourly rate (clamped to [0, 1]) |

        Results are cached for **1 hour** per learner. The `meta.cacheHit` field
        indicates whether the result was served from cache. Dismissed mentors
        (via `POST /users/recommendations/dismiss/:mentorId`) and mentors with
        ≥ 3 prior sessions with this learner are excluded automatically.

        Returns `404` with code `LEARNER_NOT_FOUND` if the authenticated user
        does not have a learner profile.

        ### Rate limit
        **standardLimiter**: 100 requests per 15 minutes.
      tags:
        - Recommendations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Recommendations retrieved successfully (may be served from cache).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationListResponse'
              example:
                success: true
                data:
                  recommendations:
                    - mentorId: "b1e2f3a4-5678-4abc-90de-f01234567890"
                      mentor:
                        id: "b1e2f3a4-5678-4abc-90de-f01234567890"
                        userId: "d290f1ee-6c54-4b01-90e6-d701748f0851"
                        skills: ["Python", "Machine Learning", "Data Science"]
                        averageRating: 4.75
                        hourlyRate: 80.00
                        isAvailable: true
                        bio: "Senior ML engineer with 8 years of industry experience."
                        createdAt: "2023-11-01T09:00:00.000Z"
                      totalScore: 0.81
                      scoreBreakdown:
                        skillMatch: 0.67
                        rating: 0.75
                        availability: 0.85
                        priceFit: 1.00
                      sessionCount: 1
                      rank: 1
                  meta:
                    cachedAt: "2024-07-21T18:00:00.000Z"
                    cacheHit: false
                    count: 1
        '401':
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: |
            The authenticated user does not have a learner profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                success: false
                error:
                  message: "Learner not found"
                  code: "LEARNER_NOT_FOUND"
        '429':
          description: Rate limit exceeded (100 req / 15 min).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /users/recommendations/dismiss/{mentorId}:
    post:
      operationId: dismissRecommendation
      summary: Dismiss a mentor recommendation
      description: |
        Marks the specified mentor as dismissed for the authenticated learner.
        Dismissed mentors are excluded from all future recommendation results.

        This operation is **idempotent** — dismissing an already-dismissed mentor
        returns `204` without error. Dismissing a mentor also **invalidates the
        learner's recommendation cache**, so the next call to
        `GET /users/recommendations/mentors` will recompute results.

        ### Validation rules (from `validationSchemas.dismissRecommendation`)
        | Parameter | Type | Constraint |
        |---|---|---|
        | `mentorId` | path param | valid UUID v4, required |

        ### Rate limit
        **standardLimiter**: 100 requests per 15 minutes.
      tags:
        - Recommendations
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: mentorId
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the mentor to dismiss.
          example: "b1e2f3a4-5678-4abc-90de-f01234567890"
      responses:
        '204':
          description: Recommendation dismissed successfully. No response body.
        '400':
          description: Validation error — `mentorId` path parameter is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                success: false
                error:
                  message: "Invalid mentor ID format"
                  code: "VALIDATION_ERROR"
        '401':
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Mentor not found — no mentor exists with the given `mentorId`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                success: false
                error:
                  message: "Mentor not found"
                  code: "MENTOR_NOT_FOUND"
        '429':
          description: Rate limit exceeded (100 req / 15 min).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /users/recommendations/click/{mentorId}:
    post:
      operationId: logRecommendationClick
      summary: Log a recommendation click event
      description: |
        Records that the authenticated learner clicked on a mentor recommendation.
        Used for analytics and future ranking improvements.

        This is a **fire-and-forget** endpoint:
        - The response is **always `204 No Content`**, regardless of whether the
          click could be persisted (logging failures are swallowed silently).
        - Clients should never retry on error — the `204` is authoritative.

        The request body is entirely optional. Supplying `rank` improves
        click-position analytics but is not required.

        ### Rate limit
        **standardLimiter**: 100 requests per 15 minutes.
      tags:
        - Recommendations
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: mentorId
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the mentor that was clicked.
          example: "b1e2f3a4-5678-4abc-90de-f01234567890"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogClickRequest'
            examples:
              withRank:
                summary: Click with rank position
                value:
                  rank: 2
              noBody:
                summary: Click without optional body
                value: {}
      responses:
        '204':
          description: |
            Click recorded (or silently dropped). Always returned regardless of
            internal logging outcome. No response body.
        '429':
          description: Rate limit exceeded (100 req / 15 min).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

